name: Build PSP EBOOT

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: pspdev/pspdev:latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install packaging tools
        run: |
          set -e
          if command -v apt-get >/dev/null 2>&1; then
            apt-get update
            apt-get install -y zip
          elif command -v apk >/dev/null 2>&1; then
            apk add --no-cache zip
          elif command -v dnf >/dev/null 2>&1; then
            dnf install -y zip
          elif command -v yum >/dev/null 2>&1; then
            yum install -y zip
          else
            echo "No supported package manager found to install zip" >&2
            exit 1
          fi

      - name: Verify PSP SDK
        run: |
          which psp-config
          psp-config --pspsdk-path

      - name: Clean
        run: make clean

      - name: Build fresh EBOOT
        run: make EBOOT.PBP -j"$(nproc)"

      - name: Package
        run: make package

      - name: Check outputs
        run: |
          test -f EBOOT.PBP
          test -f MinecraftPSP-package.zip
          test -f BUILD_INFO.txt
          ls -lh EBOOT.PBP MinecraftPSP-package.zip BUILD_INFO.txt

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: psp-build-artifacts
          path: |
            EBOOT.PBP
            MinecraftPSP-package.zip
          if-no-files-found: error
