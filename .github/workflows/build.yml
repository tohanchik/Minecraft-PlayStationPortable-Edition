name: Build PSP EBOOT

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/pspdev/pspdev:latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build
        run: make -j"$(nproc)"

      - name: Upload EBOOT artifact
        uses: actions/upload-artifact@v4
        with:
          name: MinecraftPSP-EBOOT
          path: |
            EBOOT.PBP
