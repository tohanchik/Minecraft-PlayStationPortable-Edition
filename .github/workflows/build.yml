name: Build PSP EBOOT

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/pspdev/pspdev:latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify toolchain
        run: |
          psp-config --pspdev-path
          psp-config --pspsdk-path
          psp-gcc --version

      - name: Build EBOOT
        run: make -j"$(nproc)"

      - name: Ensure zip utility
        run: |
          if command -v zip >/dev/null 2>&1; then
            exit 0
          fi
          if command -v apt-get >/dev/null 2>&1; then
            apt-get update && apt-get install -y zip
          elif command -v apk >/dev/null 2>&1; then
            apk add --no-cache zip
          else
            echo "zip utility is required but package manager was not found" >&2
            exit 1
          fi

      - name: Package distributable
        run: make package

      - name: Upload EBOOT
        uses: actions/upload-artifact@v4
        with:
          name: EBOOT.PBP
          path: EBOOT.PBP
          if-no-files-found: error

      - name: Upload packaged zip
        uses: actions/upload-artifact@v4
        with:
          name: MinecraftPSP-dist
          path: dist/MinecraftPSP.zip
          if-no-files-found: error
